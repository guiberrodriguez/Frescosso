  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);width:100%;max-width:400px;padding:34px 30px}
  .brand-word{font-size:30px;font-weight:800;letter-spacing:-.5px;text-align:center;margin-bottom:4px}
  .brand-word .f{color:var(--green2)} .brand-word .rest{color:var(--green)}
  .login-sub{text-align:center;color:var(--muted);margin-bottom:24px;font-size:13px}
  .logo-img{display:block;height:44px;margin:0 auto 8px}
  .logo-img-top{height:30px;display:block}
  /* ---------- APP ---------- */
  .topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:10}
  .topbar .logo{font-size:20px;font-weight:800;letter-spacing:-.4px}
  .topbar .logo .f{color:var(--green2)} .topbar .logo .rest{color:var(--green)}
  .topbar .who{margin-left:auto;color:var(--muted);font-size:12.5px}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 22px}
  .nav-seg{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .nav-seg button{font:inherit;font-weight:700;font-size:13.5px;padding:9px 18px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:.15s}
  .nav-seg button:hover{background:var(--surface2)}
  .nav-seg button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .page-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px;gap:14px;flex-wrap:wrap}
  .page-h h1{font-size:22px;font-weight:800}
  .page-h p{color:var(--muted);font-size:13px}
  /* fields */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
  input,select{width:100%;font:inherit;font-size:14px;padding:11px 13px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);outline:none}
  input:focus,select:focus{border-color:var(--green);background:#fff}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.frow{grid-template-columns:1fr}}
  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;font:inherit;font-weight:700;font-size:13.5px;padding:11px 16px;border-radius:12px;transition:.15s;line-height:1;white-space:nowrap}
  .btn-sm{padding:7px 10px;font-size:12.5px;border-radius:9px}
  .btn-primary{background:var(--green);color:#fff} .btn-primary:hover{background:#016d2d}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)} .btn-ghost:hover{background:#eef0f2}
  .btn-block{width:100%;justify-content:center}
  /* card + table */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm);padding:18px}
  .tbl-filter{display:flex;align-items:center;gap:8px;margin:14px 0 10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 13px;max-width:340px}
  .tbl-filter input{border:none;background:none;padding:0;font-size:13px}
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm)}
  table{width:100%;border-collapse:collapse;table-layout:auto}
  th,td{padding:10px 10px;text-align:left;font-size:12.5px;white-space:normal;vertical-align:top}
  td{overflow-wrap:anywhere}
  thead th{background:var(--surface2);color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;font-weight:700;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;word-break:normal;overflow-wrap:normal}
  thead th.na{cursor:default}
  tbody tr{border-bottom:1px solid var(--border)} tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  .t-strong{font-weight:700} .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap} .muted{color:var(--muted)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:20px;white-space:nowrap;max-width:100%}
  .badge .d{width:6px;height:6px;border-radius:50%;background:currentColor;flex:0 0 6px}
  .b-ok{background:#e3f6ec;color:#0f7a3d} .b-bad{background:#fde7e8;color:#c5343b}
  .b-neutral{background:#eef0f2;color:#5b6b62} .b-warn{background:#fdf2dd;color:#9a6800} .b-info{background:#e6effc;color:#1f5fc0}
  .est-sel{border:1px solid var(--border);border-radius:20px;padding:4px 8px;font-size:11.5px;font-weight:700;cursor:pointer;max-width:130px}
  .est-ok{color:#0f7a3d;background:#e3f6ec;border-color:#cdeeda} .est-info{color:#1f5fc0;background:#e6effc;border-color:#d3e3fb}
  .est-warn{color:#9a6800;background:#fdf2dd;border-color:#f7e6bf} .est-bad{color:#c5343b;background:#fde7e8;border-color:#f7d2d4}
  .est-neutral{color:#5b6b62;background:#eef0f2;border-color:var(--border)}
  .row-actions{display:flex;gap:5px;flex-wrap:wrap}
  .row-actions .btn-sm{padding:5px 9px;font-size:11.5px}
  /* modal */
  #overlay{position:fixed;inset:0;background:rgba(10,20,15,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  #overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:22px;width:100%;max-width:540px;max-height:92vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
  .modal-h h3{font-size:17px;font-weight:800}
  .x{background:none;border:none;font-size:24px;line-height:1;cursor:pointer;color:var(--faint)}
  .modal-b{padding:20px 22px} .modal-f{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .note{display:flex;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;font-size:12.5px;color:var(--muted);margin-top:8px}
  .empty{padding:40px;text-align:center;color:var(--faint)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
  .kpi .kl{font-size:12px;color:var(--muted);font-weight:700}
  .kpi .kv{font-size:24px;font-weight:800;margin-top:6px}
  .kpi .kd{font-size:11.5px;color:var(--faint);margin-top:2px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
  .legend-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
  .legend-row:last-child{border-bottom:none}
  .seg{display:inline-flex;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:3px;gap:3px;flex-wrap:wrap}
  .seg button{border:none;background:none;font:inherit;font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:8px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--green);color:#fff}
  .prog{height:7px;background:var(--surface2);border-radius:5px;overflow:hidden}.prog span{display:block;height:100%}
  h3.sec{font-size:14px;font-weight:800;margin:2px 0 12px}
  /* ---------- LAYOUT: sidebar + main ---------- */
  #app{display:flex;min-height:100vh}
  .sidebar{width:236px;flex:0 0 236px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:40;transition:transform .25s ease}
  .sidebar{display:flex;flex-direction:column}
  .sidebar .brand{padding:18px 18px 12px;position:sticky;top:0;background:var(--surface);z-index:2;border-bottom:1px solid var(--border)}
  #sidenav{overflow-y:auto;flex:1}
  .logo-side{height:30px;display:block}
  #sidenav{padding:6px 12px 24px}
  .nav-group{margin-top:10px}
  .nav-group .gl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:800;padding:10px 10px 5px}
  .navlink{display:flex;align-items:center;gap:11px;width:100%;border:none;background:none;font:inherit;font-weight:600;font-size:13.5px;color:var(--muted);padding:9px 11px;border-radius:10px;cursor:pointer;text-align:left;transition:.12s}
  .navlink:hover{background:var(--surface2);color:var(--text)}
  .navlink.on{background:var(--green);color:#fff}
  .navlink .ic{width:18px;text-align:center;font-size:15px;flex:0 0 18px}
  .navlink .ic svg{width:18px;height:18px;display:block}
  .kpi .ki svg{width:19px;height:19px;color:var(--green)}
  .main{flex:1;margin-left:236px;min-width:0;display:flex;flex-direction:column}
  .topbar2{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:30}
  .pagetitle{font-size:16px;font-weight:800}
  .greet .greet-hi{font-size:15px;font-weight:800;line-height:1.1}
  .greet .greet-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .iconbtn svg{width:18px;height:18px}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;color:var(--text)}
  .iconbtn:hover{background:var(--border)}
  .hamburger{display:none}
  .who{color:var(--muted);font-size:12.5px}
  .content{padding:24px 24px 60px;max-width:1200px;width:100%;margin:0 auto}
  .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
  .backdrop.show{display:block}
  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:none}
    .main{margin-left:0}
    .hamburger{display:inline-flex}
    .who{display:none}
  }
  .kpi{position:relative;overflow:hidden}
  .kpi .ki{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:11px;background:color-mix(in srgb,var(--green) 13%,transparent);display:flex;align-items:center;justify-content:center;font-size:17px}
  .kpi .kdelta{font-size:11.5px;font-weight:700;margin-top:4px}
  .kpi .kdelta.up{color:var(--ok)} .kpi .kdelta.down{color:var(--bad)}
  .bars{display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:10px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;justify-content:flex-end;height:100%}
  .bar{width:60%;max-width:34px;background:linear-gradient(180deg,var(--green2),var(--green));border-radius:6px 6px 0 0;min-height:3px}
  .bar-lbl{font-size:10.5px;color:var(--muted)}
  .hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px}
  .hbar-row .nm{width:34%;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar-track{flex:1;height:10px;background:var(--surface2);border-radius:6px;overflow:hidden}
  .hbar-fill{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));border-radius:6px}
  .hbar-val{width:96px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  /* ---------- MÓVIL: tablas como tarjetas, KPIs compactos ---------- */
  @media(max-width:720px){
    .content{padding:16px 13px 50px}
    .page-h h1{font-size:19px}
    .page-h p{font-size:12px}
    .kpis{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .kpi{padding:13px 13px 14px}
    .kpi .kl{font-size:10.5px}
    .kpi .kv{font-size:18px}
    .kpi .kd{font-size:11px}
    .kpi .ki{width:30px;height:30px;top:11px;right:11px}
    .kpi .ki svg{width:15px;height:15px}
    .kpi .kdelta{font-size:10.5px}
    .tbl-filter{max-width:none}
    /* tabla -> tarjetas apiladas */
    .tbl-wrap{border:none;background:none;box-shadow:none;border-radius:0;overflow:visible}
    .tbl-wrap table,.tbl-wrap tbody,.tbl-wrap tr,.tbl-wrap td{display:block;width:100%}
    .tbl-wrap thead{display:none}
    .tbl-wrap tbody tr{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm);margin-bottom:11px;padding:5px 2px}
    .tbl-wrap tbody tr:hover{background:var(--surface)}
    .tbl-wrap td{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:7px 14px;border:none;text-align:right;font-size:13px}
    .tbl-wrap td::before{content:attr(data-label);text-align:left;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex:0 0 38%;white-space:normal}
    .tbl-wrap td:first-child{display:block;text-align:left;font-size:15px;font-weight:800;border-bottom:1px solid var(--border);padding:8px 14px 9px;margin-bottom:3px}
    .tbl-wrap td:first-child::before{display:none}
    .tbl-wrap td .row-actions{justify-content:flex-end;flex-wrap:wrap}
    .tbl-wrap td:empty{display:none}
    .tr-total{background:var(--surface2)!important;border:1px solid var(--border);border-radius:12px}
    .tr-total td{padding:6px 14px;font-weight:700}
    .tr-total td:first-child{font-size:13px;border:none;padding-bottom:6px;margin:0}
  }
  /* toast */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--text);color:#fff;padding:13px 20px;border-radius:13px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);transition:.35s;z-index:100;max-width:90vw;text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.bad{background:var(--bad)} #toast.warn{background:var(--warn)}
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  .btn-ghost .spinner,.loading-row .spinner{border-color:rgba(0,0,0,.15);border-top-color:var(--green)}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <img id="logoLogin" class="logo-img" alt="Frescosso">
    <div class="login-sub">Centro de control · inicia sesión</div>
    <div class="field"><label>Correo</label><input id="lg_email" type="email" placeholder="tu@correo.com" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input id="lg_pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary btn-block" id="lg_btn" onclick="iniciarSesion()">Iniciar sesión</button>
    <div id="lg_msg" class="note hidden"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">

  </aside>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <div class="greet"><div class="greet-hi" id="saludo">Hola</div><div class="greet-sub" id="saludoSub"></div></div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <button class="iconbtn" id="temaBtn" onclick="toggleTema()" title="Cambiar tema" aria-label="Tema"></button>
        <button class="iconbtn" id="btnEmpresa" onclick="modalEmpresa()" title="Configuración de empresa" aria-label="Empresa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"/></svg></button>
        <button class="iconbtn" onclick="cerrarSesion()" title="Cerrar sesión" aria-label="Salir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
      </div>
    </div>
    <div class="content">
      <div id="view"><div class="card empty"><span class="spinner"></span> Cargando…</div></div>
    </div>
  </div>
</div>

const $=id=>document.getElementById(id);

function openModal(title,body,footer){
  $('overlay').innerHTML=`<div class="modal"><div class="modal-h"><h3>${title}</h3><button class="x" onclick="cerrarModal()">×</button></div>

}

/* ======================= AUTENTICACIÓN ======================= */
async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) entrarApp(session); else mostrarLogin();
  sb.auth.onAuthStateChange((_e,s)=>{ if(s) entrarApp(s); else mostrarLogin(); });
}
function mostrarLogin(){ $('app').classList.add('hidden'); $('login').classList.remove('hidden'); }
async function entrarApp(session){
  $('login').classList.add('hidden'); $('app').classList.remove('hidden');
  aplicarTema(); saludar(session.user?.email||'');
  await cargarPerfil(session.user);   // define state.roles y state.allowed
  aplicarPermisos();
  buildSidebar();
  if(!puede(state.view)) state.view=primeraVista();
  $('view').innerHTML=`<div class="card empty"><span class="spinner"></span> Cargando datos…</div>`;
  await cargarBase();          // catálogos + ajustes (se usan en varios módulos)
  go(state.view);
}
/* ---- PERMISOS POR ROL ---- */
const ROLE_VIEWS={
  'Administrador':'*', 'Gerente':'*',
  'Vendedor':['dashboard','pedidos','clientes','cotizaciones','precios'],
  'Cajera':['dashboard','pedidos','cobrar','clientes'],
  'Chofer':['pedidos'], 'Ayudante':['pedidos'],
  'Almacén':['dashboard','productos','insumos','compras','proveedores'],
  'Finanzas':['dashboard','gastos','cobrar','pagar','resultados','dgii','precios']
};
function computeAllowed(roles){
  if(roles.some(r=>ROLE_VIEWS[r]==='*')) return '*';
  const s=new Set();
  roles.forEach(r=>(ROLE_VIEWS[r]||[]).forEach(v=>s.add(v)));
  if(!s.size){ s.add('dashboard'); s.add('pedidos'); }
  return [...s];
}
function puede(view){ return state.allowed==='*' || (state.allowed||[]).includes(view); }
function esAdmin(){ return (state.roles||[]).some(r=>r==='Administrador'||r==='Gerente'); }
function primeraVista(){
  for(const [,items] of NAV) for(const [k] of items) if(puede(k)) return k;
  return 'pedidos';
}
async function cargarPerfil(user){

/* Convierte cada celda en "etiqueta: valor" para la vista de tarjetas en móvil.
   Lee los encabezados de cada tabla y los asigna a las celdas del cuerpo. */
function labelizeTables(){
  document.querySelectorAll('#view table').forEach(tabla=>{
    const ths=[...tabla.querySelectorAll('thead th')].map(th=>th.textContent.trim());
    if(!ths.length) return;
    tabla.querySelectorAll('tbody tr').forEach(tr=>{
      const tds=[...tr.children];
      // filas de totales (con colspan) no se etiquetan
      if(tds.some(td=>td.hasAttribute('colspan'))){ tr.classList.add('tr-total'); return; }
      tds.forEach((td,i)=>{ if(ths[i]) td.setAttribute('data-label', ths[i]); });
    });
  });
}

async function guardarCliente(id){
  const v=x=>$(x)?.value.trim();
  const nombre=v('f_nombre'); if(!nombre){ toast('Ingresa el nombre comercial','bad'); return; }
  const pago=v('f_pago'); const lim=Number(v('f_lim')||0);
  if(pago==='credito' && !lim){ toast('No puedes dar crédito sin límite','bad'); return; }
  const reg={ nombre, rnc:v('f_rnc')||null, encargado:v('f_enc')||null, tel:v('f_tel')||null,
    zona:v('f_zona'), dir:v('f_zona'), categoria:v('f_cat'), pago, limite:lim, dias:Number(v('f_dias')||0) };
  const btn=$('save_btn'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  let error;
  if(id){ ({ error } = await sb.from('clientes').update(reg).eq('id',id)); }
  else  { ({ error } = await sb.from('clientes').insert({ ...reg, balance:0, estado:'activo' })); }
  if(error){ toast('Error: '+error.message,'bad'); btn.innerHTML=id?'Actualizar':'Guardar'; btn.disabled=false; return; }
  cerrarModal(); toast(id?'Cliente actualizado ✓':`Cliente "${nombre}" guardado ✓`);
  await cargarClientes();
}

function calcMargenP(){

async function guardarProducto(id){
  const v=x=>$(x)?.value.trim();
  const nombre=v('p_nombre'); if(!nombre){ toast('Ingresa el nombre del producto','bad'); return; }
  const reg={ nombre, categoria:v('p_cat'), unidad:v('p_uni'),
    costo:Number(v('p_costo')||0), precio:Number(v('p_precio')||0),
    stock:Number(v('p_stock')||0), stock_min:Number(v('p_min')||0),
    proveedor_id: v('p_prov') ? Number(v('p_prov')) : null };

  if(id){ ({ error } = await sb.from('productos').update(reg).eq('id',id)); }
  else  { ({ error } = await sb.from('productos').insert({ ...reg, estado:'activo' })); }
  if(error){ toast('Error: '+error.message,'bad'); btn.innerHTML=id?'Actualizar':'Guardar'; btn.disabled=false; return; }

async function toggleProducto(id){
  const p=state.productos.find(x=>x.id===id);
  const nuevo = p.estado==='inactivo' ? 'activo' : 'inactivo';
  const { error } = await sb.from('productos').update({ estado:nuevo }).eq('id',id);
  if(error){ toast('Error: '+error.message,'bad'); return; }
  toast(nuevo==='inactivo'?'Producto bloqueado':'Producto activado'); await cargarProductos();
}
async function eliminarProducto(id){
  const p=state.productos.find(x=>x.id===id);
  if(!confirm(`¿Eliminar "${p.nombre}"? Esta acción no se puede deshacer.`)) return;
  const { error } = await sb.from('productos').delete().eq('id',id);
  if(error){ toast('Error: '+error.message,'bad'); return; }
  toast('Producto eliminado'); await cargarProductos();
}

function provScore(p){
  const cal=(Number(p.calidad)||0)*20, pun=(Number(p.puntualidad)||0)*20, cre=Math.min((Number(p.credito)||0)/30,1)*100;
  return Math.round(0.4*cal + 0.4*pun + 0.2*cre);
}
const estrellas=n=>'★'.repeat(n)+`<span style="opacity:.3">${'★'.repeat(5-n)}</span>`;

function renderProveedores(){
  return `
    <div class="page-h"><div><h1>Proveedores</h1><p>Suplidores y su evaluación · guardado en Supabase</p></div>

function listaProveedores(){

      <td><div class="t-strong">${esc(p.nombre)}</div><div class="muted" style="font-size:11.5px">${esc(p.categoria||'—')}</div></td>
      <td class="muted">${esc(p.zona||'—')}</td>

      <td style="color:var(--warn)">${estrellas(Number(p.puntualidad)||0)}</td>
      <td class="num">${Number(p.credito)>0?Number(p.credito)+' días':'Contado'}</td>

const N=v=>Number(v||0);
const err=e=>`<div class="card empty">Error: ${esc(e.message||e)}</div>`;
const fechaCorta=d=>d?String(d).slice(5):'—';
function pageH(t,sub,btn){ return `<div class="page-h"><div><h1>${t}</h1><p>${sub}</p></div>${btn||''}</div>`; }

/* ================== DASHBOARD ================== */
async function cargarDashboard(){
  const [ped,gas] = await Promise.all([
    sb.from('pedidos').select('id,total,estado,fecha').order('id',{ascending:false}),
    sb.from('gastos').select('categoria,monto').order('id',{ascending:false})
  ]);
  state.pedidos=ped.data||[]; state.gastos=gas.data||[]; render();
}
function renderDashboard(){
  const act=state.pedidos.filter(p=>p.estado!=='Cancelado');
  const ventas=act.reduce((a,p)=>a+N(p.total),0);
  const gastos=state.gastos.reduce((a,g)=>a+N(g.monto),0);
  const cxc=state.clientes.reduce((a,c)=>a+N(c.balance),0);
  const low=state.productos.filter(p=>N(p.stock)<N(p.stock_min)).length;
  const k=(l,v,ic,d,cls)=>`<div class="card kpi"><div class="ki">${ic}</div><div class="kl">${l}</div><div class="kv">${v}</div>${d?`<div class="kdelta ${cls||''}">${d}</div>`:''}</div>`;
  // ventas por día (últimos 7)
  const porDia={}; act.forEach(p=>{const f=p.fecha||'';porDia[f]=(porDia[f]||0)+N(p.total);});
  const dias=Object.keys(porDia).sort().slice(-7);
  const maxD=Math.max(1,...dias.map(d=>porDia[d]));
  const barras=dias.length?dias.map(d=>`<div class="bar-col"><div class="bar" style="height:${Math.max(3,porDia[d]/maxD*100)}%" title="${RD(porDia[d])}"></div><div class="bar-lbl">${d.slice(5)}</div></div>`).join(''):'<div class="empty" style="margin:auto">Sin ventas registradas aún</div>';
  // gastos por categoría
  const porCat={}; state.gastos.forEach(g=>{porCat[g.categoria||'Otros']=(porCat[g.categoria||'Otros']||0)+N(g.monto);});
  const cats=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxC=Math.max(1,...cats.map(c=>c[1]));
  const hbars=cats.length?cats.map(([c,v])=>`<div class="hbar-row"><span class="nm">${esc(c)}</span><div class="hbar-track"><div class="hbar-fill" style="width:${v/maxC*100}%"></div></div><span class="hbar-val">${RD(v)}</span></div>`).join(''):'<div class="empty">Sin gastos</div>';
  return `${pageH('Inicio','Resumen del negocio · datos en vivo de Supabase')}
    <div class="kpis">
      ${k('Ventas registradas',RD(ventas),ico('gasto'),state.pedidos.length+' pedidos','up')}
      ${puede('gastos')?k('Gastos',RD(gastos),ico('pagar'),'',  ''):''}
      ${puede('cobrar')?k('Por cobrar',RD(cxc),ico('cobrar'),cxc>0?'pendiente de clientes':'al día',cxc>0?'down':'up'):''}
      ${k('Clientes',state.clientes.length,ico('clientes'),'activos','')}
      ${k('Productos',state.productos.length,ico('producto'),low?`${low} bajo mínimo`:'stock OK',low?'down':'up')}
    </div>
    <div class="grid2">
      <div class="card"><h3 class="sec">Ventas por día</h3><div class="bars">${barras}</div></div>
      ${puede('gastos')?`<div class="card"><h3 class="sec">Gastos por categoría</h3>${hbars}</div>`:''}
    </div>
    <div class="card" style="margin-top:14px"><h3 class="sec">Accesos rápidos</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${puede('pedidos')?`<button class="btn btn-primary" onclick="go('pedidos')">+ Nuevo pedido</button>`:''}
        ${puede('cobrar')?`<button class="btn btn-ghost" onclick="go('cobrar')">Cuentas por cobrar</button>`:''}
        ${puede('inteligencia')?`<button class="btn btn-ghost" onclick="go('inteligencia')">Inteligencia de precios</button>`:''}
        ${puede('cotizaciones')?`<button class="btn btn-ghost" onclick="go('cotizaciones')">Cotizaciones</button>`:''}
      </div></div>`;
}

async function cargarPedidos(){
  const { data, error } = await sb.from('pedidos')
    .select('*, clientes(nombre), pedido_lineas(producto_id,cantidad,precio_unitario)')
    .order('id',{ascending:false});
  if(error){ $('view').innerHTML=err(error); return; }
  state.pedidos=data||[]; render();
}
const ESTADOS_PEDIDO=['Confirmado','Preparando','En ruta','Entregado','Cancelado'];
function claseEstado(e){ return ({Entregado:'est-ok','En ruta':'est-info',Preparando:'est-warn',Confirmado:'est-info',Cancelado:'est-bad'}[e])||'est-neutral'; }
function estadoSelect(p){
  const ops=ESTADOS_PEDIDO.includes(p.estado)?ESTADOS_PEDIDO:[p.estado,...ESTADOS_PEDIDO];
  return `<select class="est-sel ${claseEstado(p.estado)}" onchange="cambiarEstadoPedido(${p.id},this.value)">
    ${ops.map(e=>`<option ${e===p.estado?'selected':''}>${e}</option>`).join('')}</select>`;
}
async function cambiarEstadoPedido(id,estado){
  const { error } = await sb.from('pedidos').update({ estado }).eq('id',id);
  if(error){ toast('Error: '+error.message,'bad'); return; }
  const p=state.pedidos.find(x=>x.id===id); if(p) p.estado=estado;
  toast('Estado: '+estado+' ✓'); render();
}
function renderPedidos(){

function modalPedido(){

    <div id="credWarn"></div>

      <div class="legend-row" style="padding:3px 0;border:none"><span class="t-strong">Total</span><span class="t-strong" id="pd_total" style="color:var(--green);font-size:17px">RD$0</span></div>
    </div>`,

     <button class="btn btn-primary" id="save_btn" onclick="guardarPedido()">Crear pedido</button>`);

function renderPedRows(){
  const opts=sel=>state.productos.filter(p=>p.estado!=='inactivo').map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.nombre)} (${RD(p.precio)}/${p.unidad})</option>`).join('');
  $('pedRows').innerHTML=state.pedItems.map((it,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px">
    <select style="flex:1" onchange="state.pedItems[${i}].prod=Number(this.value);recalcPed()">${opts(it.prod)}</select>
    <input type="number" value="${it.cant}" style="width:84px;text-align:center" oninput="state.pedItems[${i}].cant=Number(this.value);recalcPed()">
    <button class="btn btn-ghost btn-sm" onclick="state.pedItems.splice(${i},1);renderPedRows();recalcPed()">✕</button>
  </div>`).join('');
  recalcPed();
}
function addPedRow(){ state.pedItems.push({prod:(state.productos[0]||{}).id,cant:1}); renderPedRows(); }
function recalcPed(){
  const sub=state.pedItems.reduce((a,it)=>a+N(prodById(it.prod).precio)*N(it.cant),0);
  const desc=N($('pd_desc')?.value); const base=Math.max(0,sub-desc);
  const itbis=$('pd_grav')?.checked? Math.round(base*AJ.itbis)/100 : 0;
  if($('pd_sub')) $('pd_sub').textContent=RD(sub);
  if($('pd_itbis')) $('pd_itbis').textContent=RD(itbis);
  if($('pd_total')) $('pd_total').textContent=RD(base+itbis);
}
function chequearCredito(){
  const c=clienteById(Number($('pd_cli')?.value)); const w=$('credWarn'); if(!c||!w){return;}
  const sobre = c.estado==='moroso' || (N(c.limite)>0 && N(c.balance)>N(c.limite));
  w.innerHTML = sobre ? `<div class="note" style="border-color:var(--bad);color:var(--bad);background:#fde7e8">⚠️ ${esc(c.nombre)} está bloqueado o excede su límite de crédito (balance ${RD(c.balance)} / límite ${RD(c.limite)}). Cobra antes de despachar.</div>` : '';
}
async function guardarPedido(){
  const c=clienteById(Number($('pd_cli').value));
  const items=state.pedItems.filter(it=>it.prod&&N(it.cant)>0);
  if(!c){ toast('Elige un cliente','bad'); return; }
  if(!items.length){ toast('Agrega al menos un producto','bad'); return; }
  const sub=items.reduce((a,it)=>a+N(prodById(it.prod).precio)*N(it.cant),0);
  const desc=N($('pd_desc').value); const base=Math.max(0,sub-desc);
  const grav=$('pd_grav').checked; const itbis=grav?Math.round(base*AJ.itbis)/100:0;
  const numero=Math.max(1040,...state.pedidos.map(p=>N(p.numero)))+1;
  const ncfTipo=$('pd_ncf').value;
  const ncf = ncfTipo ? await asignarNCF(ncfTipo) : null;
  const btn=$('save_btn'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  const { data:ped, error } = await sb.from('pedidos').insert({
    numero, cliente_id:c.id, fecha:new Date().toISOString().slice(0,10),
    entrega:$('pd_entrega').value||null, estado:'Confirmado',
    descuento:desc, gravado:grav, nota:$('pd_nota').value||null,
    subtotal:sub, itbis, total:base+itbis, ncf, ncf_tipo:ncfTipo||null
  }).select().single();
  if(error){ toast('Error: '+error.message,'bad'); btn.innerHTML='Crear pedido'; btn.disabled=false; return; }
  const lineas=items.map(it=>({pedido_id:ped.id, producto_id:it.prod, cantidad:N(it.cant), precio_unitario:N(prodById(it.prod).precio)}));
  const { error:e2 } = await sb.from('pedido_lineas').insert(lineas);
  if(e2){ toast('Pedido creado, pero error en líneas: '+e2.message,'warn'); }
  cerrarModal(); toast(`Pedido #${numero} creado ✓`); await cargarPedidos();
}
async function asignarNCF(tipo){
  const { data, error } = await sb.from('ncf_secuencias').select('*').eq('tipo',tipo).single();
  if(error||!data) return null;
  const siguiente=N(data.actual)+1;
  if(siguiente>N(data.fin)){ toast('¡Atención! Se agotó la secuencia '+tipo,'warn'); }
  await sb.from('ncf_secuencias').update({actual:siguiente}).eq('tipo',tipo);
  return tipo + String(siguiente).padStart(8,'0');
}
async function eliminarPedido(id){
  const p=state.pedidos.find(x=>x.id===id);
  if(!confirm(`¿Eliminar el pedido #${p.numero||id}? Se borrarán también sus líneas.`)) return;
  const { error } = await sb.from('pedidos').delete().eq('id',id);
  if(error){ toast('Error: '+error.message,'bad'); return; }
  toast('Pedido eliminado'); await cargarPedidos();
}

async function aplicarItbisPedido(on){
  const p=pedidoActual();
  const base=Math.max(0, N(p.subtotal)-N(p.descuento));
  const itbis=on? Math.round(base*AJ.itbis)/100 : 0;
  const total=base+itbis;
  const { error } = await sb.from('pedidos').update({ gravado:on, itbis, total }).eq('id',p.id);
  if(error){ toast('Error: '+error.message,'bad'); return; }
  p.gravado=on; p.itbis=itbis; p.total=total;   // refleja en memoria
  toast(on?`ITBIS aplicado: ${RD(itbis)} ✓`:'ITBIS quitado'); renderDoc();
}

  p.ncf=ncf; p.ncf_tipo=tipo;            // refleja en memoria

/* ===== Impresión y PDF confiables (sirven en iPhone y PC) ===== */
function imprimirHTML(html){
  const f=document.createElement('iframe');
  f.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0';
  document.body.appendChild(f);
  const d=f.contentWindow.document; d.open(); d.write(html); d.close();
  setTimeout(()=>{ try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ toast('Tu navegador bloqueó la impresión','warn'); }
    setTimeout(()=>f.remove(), 2000); }, 450);
}
function cargarHtml2pdf(){
  return new Promise((res,rej)=>{
    if(window.html2pdf) return res();
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload=()=>res(); s.onerror=()=>rej(new Error('cdn'));
    document.head.appendChild(s);
  });
}
async function descargarPDF(html, filename){
  toast('Generando PDF…');
  try{
    await cargarHtml2pdf();
    await html2pdf().set({ margin:6, filename, image:{type:'jpeg',quality:0.96},
      html2canvas:{scale:2,useCORS:true}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'} })
      .from(html,'string').save();
    toast('PDF descargado ✓');
  }catch(e){
    toast('Abro la impresión: elige "Guardar en PDF"','warn');
    imprimirHTML(html);
  }
}

  state.compras=data||[]; render();

  const btn=$('save_btn'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  const { error } = await sb.from('compras').insert({ proveedor_id:Number($('co_prov').value), producto_id:Number($('co_prod').value),
    cantidad_texto:n+' '+$('co_uni').value, costo_unitario:cu, total:n*cu, fecha:$('co_fecha').value||new Date().toISOString().slice(0,10),
    metodo:$('co_met').value, estado:$('co_est').value });
  if(error){ toast('Error: '+error.message,'bad'); btn.innerHTML='Registrar'; btn.disabled=false; return; }
  cerrarModal(); toast('Compra registrada ✓'); await cargarCompras();

async function registrarPago(idCli){

/* ================== ESTADO DE RESULTADOS ================== */
async function cargarFinanzas(){
  const [ped,gas]=await Promise.all([
    sb.from('pedidos').select('fecha,subtotal,estado,pedido_lineas(producto_id,cantidad)').order('id'),
    sb.from('gastos').select('categoria,monto').order('id',{ascending:false})
  ]);
  state.pedidos=ped.data||[]; state.gastos=gas.data||[]; render();
}
function renderResultados(){
  const act=state.pedidos.filter(p=>p.estado!=='Cancelado');
  const ventas=act.reduce((a,p)=>a+N(p.subtotal),0);
  const costo=act.reduce((a,p)=>a+(p.pedido_lineas||[]).reduce((s,l)=>s+N(prodById(l.producto_id).costo)*N(l.cantidad),0),0);
  const bruta=ventas-costo, gastos=state.gastos.reduce((a,g)=>a+N(g.monto),0), neta=bruta-gastos;
  const margen=ventas>0?Math.round(neta/ventas*1000)/10:0;
  const row=(l,v,st)=>`<div class="legend-row"><span class="${st||''}">${l}</span><span class="${st||''}">${RD(v)}</span></div>`;
  // ventas por mes (últimos 6)
  const porMes={}; act.forEach(p=>{const m=(p.fecha||'').slice(0,7); if(m) porMes[m]=(porMes[m]||0)+N(p.subtotal);});
  const meses=Object.keys(porMes).sort().slice(-6);
  const maxM=Math.max(1,...meses.map(m=>porMes[m]));
  const nm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const barras=meses.length?meses.map(m=>`<div class="bar-col"><div class="bar" style="height:${Math.max(3,porMes[m]/maxM*100)}%" title="${RD(porMes[m])}"></div><div class="bar-lbl">${nm[+m.slice(5,7)-1]||m.slice(5)}</div></div>`).join(''):'<div class="empty" style="margin:auto">Sin ventas aún</div>';
  // composición del resultado (proporciones de ventas)
  const seg=(v,col)=>ventas>0&&v>0?`<div style="width:${Math.max(0,v/ventas*100)}%;background:${col}"></div>`:'';
  const comp = ventas>0 ? `<div style="display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--surface2)">
      ${seg(costo,'#2f73e0')}${seg(gastos,'var(--warn)')}${seg(Math.max(0,neta),'var(--green)')}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)">
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#2f73e0;margin-right:5px"></span>Costo ${ventas?Math.round(costo/ventas*100):0}%</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--warn);margin-right:5px"></span>Gastos ${ventas?Math.round(gastos/ventas*100):0}%</span>
      <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--green);margin-right:5px"></span>Ganancia ${margen}%</span>
    </div>` : '<div class="empty">Sin ventas para analizar</div>';
  // gastos por categoría (barras)
  const porCat={}; state.gastos.forEach(g=>porCat[g.categoria||'Otros']=(porCat[g.categoria||'Otros']||0)+N(g.monto));
  const cats=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  const maxC=Math.max(1,...cats.map(c=>c[1]));
  const ghbars=cats.length?cats.map(([c,v])=>`<div class="hbar-row"><span class="nm">${esc(c)}</span><div class="hbar-track"><div class="hbar-fill" style="width:${v/maxC*100}%"></div></div><span class="hbar-val">${RD(v)}</span></div>`).join(''):'<div class="empty">Sin gastos</div>';
  return `${pageH('Estado de resultados','Ganancia o pérdida del período · calculado en vivo','')}
    <div class="kpis">
      <div class="card kpi"><div class="ki">${ico('gasto')}</div><div class="kl">Ventas</div><div class="kv">${RD(ventas)}</div></div>
      <div class="card kpi"><div class="ki">${ico('resultados')}</div><div class="kl">Ganancia bruta</div><div class="kv">${RD(bruta)}</div></div>
      <div class="card kpi"><div class="ki">${ico('cobrar')}</div><div class="kl">Resultado neto</div><div class="kv" style="color:${neta>=0?'var(--green)':'var(--bad)'}">${RD(neta)}</div><div class="kdelta ${neta>=0?'up':'down'}">${neta>=0?'Ganancia':'Pérdida'} · ${margen}%</div></div>
    </div>
    <div class="grid2">
      <div class="card"><h3 class="sec">Ventas por mes</h3><div class="bars">${barras}</div></div>
      <div class="card"><h3 class="sec">¿A dónde va cada peso vendido?</h3><div style="margin-top:8px">${comp}</div></div>
    </div>
    <div class="grid2" style="margin-top:14px">
      <div class="card"><h3 class="sec">Estado de resultados</h3>
        ${row('Ventas',ventas)}${row('(−) Costo de mercancía',costo)}${row('= Ganancia bruta',bruta,'t-strong')}${row('(−) Gastos operativos',gastos)}${row('= Resultado neto',neta,'t-strong')}
      </div>
      <div class="card"><h3 class="sec">Gastos por categoría</h3>${ghbars}</div>
    </div>`;
}

const BUY=['Frescosso Compra','Merca SD','Min. Agricultura'], RET=['Nacional','Jumbo','Sirena'];
function mPrice(pid,f){ const e=state.mercado.filter(x=>x.producto_id===pid&&x.fuente===f).sort((a,b)=>String(a.fecha).localeCompare(b.fecha)); return e.length?N(e[e.length-1].precio):null; }
function cheapest(pid){ let b=null; BUY.forEach(f=>{const v=mPrice(pid,f); if(v!=null&&(!b||v<b.p))b={f,p:v};}); if(!b){const pr=prodById(pid);b={f:'Costo',p:N(pr.costo)};} return b; }
function retAvg(pid){ const v=RET.map(f=>mPrice(pid,f)).filter(x=>x!=null); return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null; }
function costoReal(pr,compra){ const cp=AJ.cost_params; const c=compra!=null?compra:cheapest(pr.id).p; return c+N(cp.transporte)+N(cp.merma)+N(cp.empaque); }
function sugerido(cr){ const cp=AJ.cost_params; const con=cr*(1+N(cp.utilidad)/100); const com=N(cp.comision)/100; return com<1?con/(1-com):con; }
function margenV(precio,costo){ return precio>0?Math.round((precio-costo)/precio*1000)/10:0; }
function mInfo(m){ const cp=AJ.cost_params; if(m>=N(cp.verde))return{b:'b-ok',d:'🟢'}; if(m>=N(cp.amarillo))return{b:'b-warn',d:'🟡'}; return{b:'b-bad',d:'🔴'}; }
function renderInteligencia(){
  const tabs=[['comparativa','Comparativa'],['simulador','Simulador'],['rentabilidad','Rentabilidad'],['proveedores','Proveedores']];
  const seg=`<div class="seg" style="margin-bottom:14px">${tabs.map(([k,l])=>`<button class="${state.intelTab===k?'on':''}" onclick="state.intelTab='${k}';render()">${l}</button>`).join('')}</div>`;
  const body={ comparativa:intelComparativa, simulador:intelSimulador, rentabilidad:intelRent, proveedores:intelScore }[state.intelTab]();
  return `${pageH('Centro de Inteligencia Comercial','¿Dónde compro más barato? ¿A cuánto vendo? ¿Cuál es mi margen?','<button class="btn btn-primary" onclick="modalMercado()">+ Registrar precio</button>')}${seg}${body}`;
}
function intelComparativa(){
  const cp=AJ.cost_params;
  const datos=state.productos.map(p=>{const cr=costoReal(p);const m=margenV(N(p.precio),cr);return {p,cr,m,mi:mInfo(m)};});
  const colorM=mi=>mi.b==='b-ok'?'var(--green)':mi.b==='b-warn'?'var(--warn)':'var(--bad)';
  const chart=`<div class="card" style="margin-bottom:14px"><h3 class="sec">Margen por producto</h3>
    ${datos.map(d=>`<div class="hbar-row"><span class="nm">${esc(d.p.nombre)}</span><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(2,Math.min(100,d.m))}%;background:${colorM(d.mi)}"></div></div><span class="hbar-val">${d.m}%</span></div>`).join('')||'<div class="empty">Sin productos</div>'}</div>`;
  const tabla=`<div class="tbl-wrap"><table><thead><tr><th>Producto</th><th class="num">Compra</th><th class="num">Merca SD</th><th class="num">Súper</th><th class="num">Costo real</th><th class="num">Sugerido</th><th class="num">Venta</th><th>Margen</th></tr></thead><tbody>
  ${datos.map(({p,cr,m,mi})=>{const fc=mPrice(p.id,'Frescosso Compra'),me=mPrice(p.id,'Merca SD'),su=retAvg(p.id),sg=Math.round(sugerido(cr));
    return `<tr><td class="t-strong">${esc(p.nombre)}</td><td class="num">${fc!=null?RD(fc):'—'}</td><td class="num">${me!=null?RD(me):'—'}</td><td class="num muted">${su!=null?RD(su):'—'}</td>
    <td class="num">${RD(cr)}</td><td class="num t-strong" style="color:var(--green)">${RD(sg)}</td><td class="num">${RD(p.precio)}</td><td><span class="badge ${mi.b}">${mi.d} ${m}%</span></td></tr>`;}).join('')}</tbody></table></div>`;
  return `<div class="note" style="margin-bottom:12px">🟢 ≥${cp.verde}% · 🟡 ${cp.amarillo}-${cp.verde}% · 🔴 &lt;${cp.amarillo}%</div>${chart}${tabla}
  <div class="note">Súper es el promedio de Nacional/Jumbo/Sirena: el techo del mercado. El sugerido sale de costo real + utilidad deseada.</div>`;
}
function intelSimulador(){
  if(!state.sim){const p=state.productos[0]||{id:0,costo:0};state.sim={pid:p.id,compra:cheapest(p.id).p,...AJ.cost_params};}
  const s=state.sim;
  setTimeout(simCalc,30);
  return `<div class="grid2"><div class="card"><h3 class="sec">Calculadora de margen</h3>
    <div class="field"><label>Producto</label><select onchange="simProd(this.value)">${state.productos.map(p=>`<option value="${p.id}" ${p.id===s.pid?'selected':''}>${esc(p.nombre)}</option>`).join('')}</select></div>
    <div class="frow"><div class="field"><label>Compra (RD$)</label><input id="s_compra" type="number" value="${s.compra}" oninput="simCalc()"></div><div class="field"><label>Transporte</label><input id="s_transporte" type="number" value="${s.transporte}" oninput="simCalc()"></div></div>
    <div class="frow"><div class="field"><label>Merma</label><input id="s_merma" type="number" value="${s.merma}" oninput="simCalc()"></div><div class="field"><label>Empaque</label><input id="s_empaque" type="number" value="${s.empaque}" oninput="simCalc()"></div></div>
    <div class="frow"><div class="field"><label>Comisión (%)</label><input id="s_comision" type="number" value="${s.comision}" oninput="simCalc()"></div><div class="field"><label>Utilidad (%)</label><input id="s_utilidad" type="number" value="${s.utilidad}" oninput="simCalc()"></div></div>
  </div><div class="card"><h3 class="sec">Resultado</h3>
    <div class="legend-row"><span>Costo real</span><span class="t-strong" id="s_costo">—</span></div>
    <div class="legend-row"><span class="t-strong" style="color:var(--green)">Precio recomendado</span><span class="t-strong" id="s_precio" style="color:var(--green);font-size:18px">—</span></div>
    <div class="legend-row"><span>Margen sobre venta</span><span id="s_margen">—</span></div>
    <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="simAplicar()">Usar como precio de venta</button>
  </div></div>`;
}
function simRead(){ ['compra','transporte','merma','empaque','comision','utilidad'].forEach(k=>state.sim[k]=N($('s_'+k).value)); }
function simCalc(){ if(!$('s_compra'))return; simRead(); const s=state.sim; const cr=s.compra+s.transporte+s.merma+s.empaque; const pr=sugerido(cr); const m=margenV(pr,cr); const mi=mInfo(m);
  $('s_costo').textContent=RD(cr); $('s_precio').textContent=RD(Math.round(pr)); $('s_margen').textContent=`${mi.d} ${m}%`; }
function simProd(id){ const p=prodById(Number(id)); state.sim.pid=p.id; state.sim.compra=cheapest(p.id).p; render(); }
async function simAplicar(){ simRead(); const s=state.sim; const cr=s.compra+s.transporte+s.merma+s.empaque; const precio=Math.round(sugerido(cr));
  const {error}=await sb.from('productos').update({precio}).eq('id',s.pid); if(error){toast('Error: '+error.message,'bad');return;}
  const p=prodById(s.pid); if(p)p.precio=precio; toast(`Precio fijado en ${RD(precio)} ✓`); }
function intelRent(){
  const map={}; (state.pedidosInt||[]).filter(p=>p.estado!=='Cancelado').forEach(p=>{const nom=p.clientes?.nombre||'—';const venta=N(p.subtotal);const costo=(p.pedido_lineas||[]).reduce((s,l)=>s+N(prodById(l.producto_id).costo)*N(l.cantidad),0);map[nom]=map[nom]||{v:0,c:0,n:0};map[nom].v+=venta;map[nom].c+=costo;map[nom].n++;});
  const rows=Object.entries(map).map(([c,o])=>{const g=o.v-o.c;const m=o.v?Math.round(g/o.v*1000)/10:0;return{c,...o,g,m,mi:mInfo(m)};}).sort((a,b)=>b.g-a.g);
  if(!rows.length) return `<div class="card empty">Aún no hay pedidos para calcular rentabilidad.</div>`;
  const top=rows.slice(0,8); const maxG=Math.max(1,...top.map(r=>r.g));
  const chart=`<div class="card" style="margin-bottom:14px"><h3 class="sec">Ganancia por cliente</h3>
    ${top.map(r=>`<div class="hbar-row"><span class="nm">${esc(r.c)}</span><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(2,r.g/maxG*100)}%"></div></div><span class="hbar-val">${RD(r.g)}</span></div>`).join('')}</div>`;
  const tabla=`<div class="tbl-wrap"><table><thead><tr><th>Cliente</th><th class="num">Pedidos</th><th class="num">Ventas</th><th class="num">Costo</th><th class="num">Ganancia</th><th>Margen</th></tr></thead><tbody>
  ${rows.map(r=>`<tr><td class="t-strong">${esc(r.c)}</td><td class="num">${r.n}</td><td class="num">${RD(r.v)}</td><td class="num muted">${RD(r.c)}</td><td class="num t-strong" style="color:var(--green)">${RD(r.g)}</td><td><span class="badge ${r.mi.b}">${r.mi.d} ${r.m}%</span></td></tr>`).join('')}</tbody></table></div>`;
  return chart+tabla;
}
function intelScore(){
  const rows=state.proveedores.filter(p=>p.estado==='activo').map(p=>({p,s:provScore(p)})).sort((a,b)=>b.s-a.s);
  return `<div class="tbl-wrap"><table><thead><tr><th>Proveedor</th><th>Zona</th><th>Calidad</th><th>Puntualidad</th><th>Crédito</th><th>Score</th></tr></thead><tbody>
  ${rows.map(r=>`<tr><td class="t-strong">${esc(r.p.nombre)}</td><td class="muted">${esc(r.p.zona||'—')}</td><td style="color:var(--warn)">${estrellas(N(r.p.calidad))}</td><td style="color:var(--warn)">${estrellas(N(r.p.puntualidad))}</td>
    <td class="num">${N(r.p.credito)>0?N(r.p.credito)+' días':'Contado'}</td><td class="num"><span class="badge ${r.s>=80?'b-ok':r.s>=60?'b-warn':'b-bad'}">${r.s}/100</span></td></tr>`).join('')}</tbody></table></div>
  <div class="note">El proveedor más barato no siempre es el más rentable: calidad y puntualidad cuentan.</div>`;
}

async function guardarUsuario(id){
  const roles=[...document.querySelectorAll('#u_roles .badge.b-ok')].map(s=>s.dataset.r);
  if(!roles.length){toast('Asigna al menos un rol','bad');return;}
  const {error}=await sb.from('perfiles').update({nombre:$('u_nombre').value.trim(),tel:$('u_tel').value.trim()||null,roles}).eq('id',id);
  if(error){toast('Error: '+error.message,'bad');return;} cerrarModal(); toast('Usuario actualizado ✓'); await cargarUsuarios();

async function toggleUsuario(id){ const u=state.usuarios.find(x=>x.id===id); const nuevo=u.estado==='activo'?'bloqueado':'activo'; const {error}=await sb.from('perfiles').update({estado:nuevo}).eq('id',id); if(error){toast('Error','bad');return;} toast('Actualizado'); await cargarUsuarios(); }
async function eliminarUsuario(id){
  const u=state.usuarios.find(x=>x.id===id);
  if(!confirm(`¿Eliminar el perfil de "${u.nombre||'este usuario'}"? La cuenta de acceso se elimina aparte desde Supabase.`)) return;
  const {error}=await sb.from('perfiles').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'bad');return;} toast('Perfil eliminado'); await cargarUsuarios();
}

function rrhhNomina(){
  const rows=state.nominas; const total=rows.reduce((a,n)=>a+N(n.neto),0);
  const tabla=!rows.length?`<div class="card empty">Aún no hay nóminas registradas.</div>`:
   `<div class="tbl-wrap"><table><thead><tr><th>Colaborador</th><th>Período</th><th>Fecha</th><th class="num">Salario</th><th class="num">Bonos</th><th class="num">Descuentos</th><th class="num">Neto</th><th class="na"></th></tr></thead><tbody>
   ${rows.map(n=>`<tr><td class="t-strong">${esc(n.empleados?.nombre||'—')}</td><td class="muted">${esc(n.periodo||'—')}</td><td class="muted">${fechaCorta(n.fecha)}</td>
     <td class="num">${RD(n.salario_bruto)}</td><td class="num" style="color:var(--green)">${N(n.bonos)?'+'+RD(n.bonos):'—'}</td><td class="num" style="color:var(--bad)">${N(n.descuentos)?'-'+RD(n.descuentos):'—'}</td>
     <td class="num t-strong">${RD(n.neto)}</td><td><button class="btn btn-ghost btn-sm" onclick="eliminarNomina(${n.id})">Eliminar</button></td></tr>`).join('')}
   <tr><td colspan="6" class="t-strong" style="text-align:right">Total pagado</td><td class="num t-strong">${RD(total)}</td><td></td></tr></tbody></table></div>`;
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-primary" onclick="modalNomina()">+ Registrar nómina</button></div>${tabla}`;
}
function modalNomina(){
  if(!state.empleados.filter(e=>e.estado==='activo').length){toast('Primero registra un colaborador','warn');return;}
  const opts=state.empleados.filter(e=>e.estado==='activo').map(e=>`<option value="${e.id}" data-sal="${N(e.salario)}">${esc(e.nombre)}</option>`).join('');
  openModal('Registrar nómina',`
    <div class="frow"><div class="field"><label>Colaborador</label><select id="n_emp" onchange="nomFill()">${opts}</select></div>
      <div class="field"><label>Período</label><input id="n_periodo" placeholder="Ej: Junio 2026 - 1ra quincena"></div></div>
    <div class="frow"><div class="field"><label>Salario bruto (RD$)</label><input id="n_bruto" type="number" oninput="nomCalc()"></div>
      <div class="field"><label>Fecha de pago</label><input id="n_fecha" type="date"></div></div>
    <div class="frow"><div class="field"><label>Bonos (RD$)</label><input id="n_bonos" type="number" value="0" oninput="nomCalc()"></div>
      <div class="field"><label>Descuentos (RD$)</label><input id="n_desc" type="number" value="0" oninput="nomCalc()"></div></div>
    <div class="field"><label>Detalle de descuentos / nota</label><input id="n_detalle" placeholder="Ej: TSS, adelanto, ausencia"></div>
    <div class="note">Neto a pagar: <b id="n_netoL">RD$0</b></div>`,
    `<button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" id="save_btn" onclick="guardarNomina()">Guardar</button>`);
  nomFill();
}
function nomFill(){ const o=$('n_emp').selectedOptions[0]; if(o&&$('n_bruto')){$('n_bruto').value=o.dataset.sal||0; nomCalc();} }
function nomCalc(){ const neto=N($('n_bruto').value)+N($('n_bonos').value)-N($('n_desc').value); $('n_netoL').textContent=RD(neto); }
async function guardarNomina(){
  const empId=Number($('n_emp').value); const bruto=N($('n_bruto').value);
  if(!bruto){toast('Ingresa el salario','bad');return;}
  const neto=bruto+N($('n_bonos').value)-N($('n_desc').value);
  const btn=$('save_btn'); btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  const {error}=await sb.from('nominas').insert({ empleado_id:empId, periodo:$('n_periodo').value||null, fecha:$('n_fecha').value||new Date().toISOString().slice(0,10),
    salario_bruto:bruto, bonos:N($('n_bonos').value), descuentos:N($('n_desc').value), neto, detalle:$('n_detalle').value||null });
  if(error){toast('Error: '+error.message,'bad'); btn.innerHTML='Guardar'; btn.disabled=false; return;}
  cerrarModal(); toast('Nómina registrada ✓'); await cargarRRHH();
}
async function eliminarNomina(id){ if(!confirm('¿Eliminar este registro de nómina?'))return; const {error}=await sb.from('nominas').delete().eq('id',id); if(error){toast('Error','bad');return;} toast('Eliminado'); await cargarRRHH(); }

function rrhhAmonest(){
  const rows=state.amonestaciones;
  const tabla=!rows.length?`<div class="card empty">Sin amonestaciones registradas.</div>`:
   `<div class="tbl-wrap"><table><thead><tr><th>Colaborador</th><th>Fecha</th><th>Tipo</th><th>Descripción</th><th class="na"></th></tr></thead><tbody>
   ${rows.map(a=>`<tr><td class="t-strong">${esc(a.empleados?.nombre||'—')}</td><td class="muted">${fechaCorta(a.fecha)}</td>
     <td><span class="badge ${a.tipo==='Suspensión'?'b-bad':a.tipo==='Escrita'?'b-warn':'b-neutral'}">${esc(a.tipo||'—')}</span></td><td>${esc(a.descripcion||'—')}</td>
     <td><button class="btn btn-ghost btn-sm" onclick="eliminarAmonest(${a.id})">Eliminar</button></td></tr>`).join('')}</tbody></table></div>`;
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-primary" onclick="modalAmonest()">+ Registrar amonestación</button></div>${tabla}`;
}
function modalAmonest(){
  if(!state.empleados.length){toast('Primero registra un colaborador','warn');return;}
  const opts=state.empleados.map(e=>`<option value="${e.id}">${esc(e.nombre)}</option>`).join('');
  openModal('Registrar amonestación',`
    <div class="frow"><div class="field"><label>Colaborador</label><select id="a_emp">${opts}</select></div>
      <div class="field"><label>Tipo</label><select id="a_tipo"><option>Verbal</option><option>Escrita</option><option>Suspensión</option></select></div></div>
    <div class="field"><label>Fecha</label><input id="a_fecha" type="date"></div>
    <div class="field"><label>Descripción del hecho</label><input id="a_desc" placeholder="Ej: llegada tarde reiterada"></div>`,
    `<button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button><button class="btn btn-primary" id="save_btn" onclick="guardarAmonest()">Guardar</button>`);
}
async function guardarAmonest(){
  const {error}=await sb.from('amonestaciones').insert({ empleado_id:Number($('a_emp').value), tipo:$('a_tipo').value, fecha:$('a_fecha').value||new Date().toISOString().slice(0,10), descripcion:$('a_desc').value||null });
  if(error){toast('Error: '+error.message,'bad');return;} cerrarModal(); toast('Amonestación registrada ✓'); await cargarRRHH();
}
async function eliminarAmonest(id){ if(!confirm('¿Eliminar esta amonestación?'))return; const {error}=await sb.from('amonestaciones').delete().eq('id',id); if(error){toast('Error','bad');return;} toast('Eliminada'); await cargarRRHH(); }

boot();
</script>
</body>
</html>
